<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Lottery Tracker</title>
        <style>
            body { font-family: sans-serif; padding: 20px; background: #F7F5F1; line-height: 1.6; }
            .result-row { margin-bottom: 10px; font-size: 1.2rem; }
            .highlight { color: red; font-weight: bold; }
            #update-time { font-size: 0.8rem; color: #666; margin-bottom: 20px; }
        </style>
    </head>
    <body>
        <h1>Lottery Status</h1>
        <div id="update-time"></div>
        <div id="results">Loading...</div>
        <button id="install" disabled type="button" style="margin-top:20px;">Install App</button>

        <script>
            const resultsDiv = document.getElementById('results');
            const timeDiv = document.getElementById('update-time');
            const broadcast = new BroadcastChannel('count-channel');

            // Formatter for "£123,456,789"
            const currencyFormatter = new Intl.NumberFormat('en-GB', {
                style: 'currency',
                currency: 'GBP',
                maximumFractionDigits: 0
            });

            const renderResults = (json) => {
                resultsDiv.innerHTML = '';
                
                timeDiv.innerText = `Last checked: ${new Intl.DateTimeFormat('en-GB', {
                    timeStyle: 'medium'
                }).format(new Date())}`;

                // 1. Process EuroMillions
                if (json.euromillions) {
                    const em = json.euromillions;
                    const emDiv = document.createElement('div');
                    emDiv.className = 'result-row';
                    
                    const amount = currencyFormatter.format(em['raw-jackpot-pounds']);
                    emDiv.innerHTML = `EuroMillions - <span class="${em['raw-jackpot-pounds'] >= 100000000 ? 'highlight' : ''}">${amount}</span>`;
                    resultsDiv.appendChild(emDiv);
                }

                // 2. Process Lotto
                if (json.lotto) {
                    const lo = json.lotto;
                    const loDiv = document.createElement('div');
                    loDiv.className = 'result-row';
                    
                    const isSpecial = ['MUST_BE_WON', 'GUARANTEED_MILLIONAIRE', 'MUST_BE_WON_GUARANTEED_MILLIONAIRE'].includes(lo.phase);
                    const phaseText = isSpecial ? `<span class="highlight">${lo.phase.replace(/_/g, ' ')} </span>` : '';
                    const amount = currencyFormatter.format(lo['raw-jackpot-pounds']);
                    
                    loDiv.innerHTML = `Lotto ${phaseText}- ${amount}`;
                    resultsDiv.appendChild(loDiv);
                }
            };

            // Listen for Service Worker updates
            broadcast.onmessage = (event) => {
                if (event.data.type === 'DATA_UPDATED') {
                    renderResults(event.data.payload);
                }
            };

            // Initial Load
            fetch('./lottoData.json')
                .then(res => res.json())
                .then(data => renderResults(data))
                .catch(err => console.error("Data not yet available"));

            // Service Worker Registration
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register("sw.js");
            }
        </script>
    </body>
</html>
