<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Lottery Tracker</title>
        <meta name="theme-color" content="#F7F5F1" />
        <link rel="icon" href="/favicon.ico">
        <style>
            body { font-family: sans-serif; padding: 20px; background: #F7F5F1; }
            .must-be-won { color: red; font-weight: bold; }
            #results { margin-top: 20px; }
            ul { list-style: none; padding-left: 10px; }
            li { margin-bottom: 5px; }
        </style>
    </head>
    <body>
        <h1>Lottery Thing</h1>
        <button id="install" disabled type="button">Install App</button>
        <div id="results">Loading lottery data...</div>

        <script>
            const EURO_MILLIONS_THRESHOLD = 99.9;
            const broadcast = new BroadcastChannel('count-channel');
            const resultsDiv = document.getElementById('results');
            const installButton = document.getElementById('install');

            // --- 1. Registration & Service Worker ---
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register("sw.js").then(reg => {
                    // Register Periodic Sync if available
                    if (reg.periodicSync) {
                        reg.periodicSync.register("get-latest-lottery-details", {
                            minInterval: 15 * 60 * 60 * 1000, // 15 hours
                        }).catch(console.error);
                    }
                });
            }

            // --- 2. Rendering Logic ---
            const renderResults = (json) => {
                resultsDiv.innerHTML = ''; 
                const cre = (el) => document.createElement(el);
                
                const headline = cre("H2");
                headline.innerText = `Last Updated: ${new Intl.DateTimeFormat('en-GB', {
                    dateStyle: 'short',
                    timeStyle: 'medium',
                }).format(new Date())}`;
                resultsDiv.appendChild(headline);
                
                const mainList = cre("UL");
                Object.keys(json).forEach(gameKey => {
                    const gameData = json[gameKey];
                    const gameTitle = cre("LI");
                    gameTitle.innerHTML = `<strong>${gameKey.toUpperCase()}</strong>`;
                    mainList.appendChild(gameTitle);

                    const detailsList = cre("UL");
                    Object.entries(gameData).forEach(([field, value]) => {
                        const detailItem = cre("LI");
                        detailItem.innerText = `${field}: ${value}`;
                        
                        // Apply red styling if conditions are met
                        if (gameKey === 'euromillions' && field === 'next-draw-jackpot-short' && parseFloat(value) > EURO_MILLIONS_THRESHOLD) {
                            detailItem.classList.add('must-be-won');
                        }
                        if (gameKey === 'lotto' && field === 'must-be-won' && (value === true || value === 'true')) {
                            detailItem.classList.add('must-be-won');
                        }
                        
                        detailsList.appendChild(detailItem);
                    });
                    mainList.appendChild(detailsList);
                });
                resultsDiv.appendChild(mainList);
            };

            // --- 3. Communication ---
            broadcast.onmessage = (event) => {
                if (event.data.type === 'DATA_UPDATED') {
                    renderResults(event.data.payload);
                    if (!matchMedia('(display-mode: standalone)').matches) {
                        console.log('Non-installed badge value:', event.data.count);
                    }
                }
            };

            // Initial manual trigger to get data immediately
            const updateData = () => {
                fetch('./lottoData.json')
                    .then(res => res.json())
                    .then(data => renderResults(data))
                    .catch(err => console.error("Initial fetch failed:", err));
            };
            updateData();

            // --- 4. Installation & Badging Logic ---
            if ('BeforeInstallPromptEvent' in window) {
                let installEvent = null;
                window.addEventListener('beforeinstallprompt', (event) => {
                    event.preventDefault();
                    installEvent = event;
                    installButton.disabled = false;
                });

                installButton.addEventListener('click', async () => {
                    if (!installEvent) return;
                    installEvent.prompt();
                    const { outcome } = await installEvent.userChoice;
                    if (outcome === 'accepted') installButton.disabled = true;
                });
            }
        </script>
    </body>
</html>
